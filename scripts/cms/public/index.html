<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yamil Ayma CMS — Panel de Desarrollo</title>
  
  <!-- Tipografías del Blog -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS v4 CDN -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <!-- React 18 & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel para transpilar JSX en caliente -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Marked para previsualización de Markdown -->
  <script src="https://unpkg.com/marked/marked.min.js"></script>

  <style type="text/tailwindcss">
    @layer base {
      :root {
        /* Paleta de colores heredada de tema Everforest 'soft' por defecto */
        --color-bg-light: #FFFBEF;
        --color-bg-dark: #fffdf0;
        --color-primary: #F2D2BD;
        --color-accent: #FFB7B2;
        --color-text: #694836;
        --color-border: rgba(74, 64, 58, 0.1);
        --font-heading: 'Comic Neue', cursive;
        --font-body: 'Balsamiq Sans', sans-serif;
      }
      body {
        font-family: var(--font-body);
        color: var(--color-text);
        background-color: var(--color-bg-light);
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: var(--font-heading);
      }
    }
    
    .cms-sidebar {
      border-right: 1px solid var(--color-border);
      background-color: #ffffff;
    }
    
    .cms-card {
      background-color: #ffffff;
      border: 1px solid var(--color-border);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }
    
    .cms-input {
      border: 1px solid var(--color-border);
      background-color: #ffffff;
      transition: all 0.2s;
    }
    .cms-input:focus {
      border-color: #d88a75;
      outline: none;
      box-shadow: 0 0 0 2px rgba(216, 138, 117, 0.2);
    }
  </style>
</head>
<body class="min-h-screen">

  <div id="root"></div>

  <!-- Lógica React Transpilada por Babel en el cliente -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      // Estado de colecciones
      const [collections, setCollections] = useState({});
      const [activeCollection, setActiveCollection] = useState('projects');
      const [searchQuery, setSearchQuery] = useState('');
      
      // Estado de recurso activo
      const [activeEntry, setActiveEntry] = useState(null);
      const [entryData, setEntryData] = useState({ metadata: {}, content: '' });
      const [isSaving, setIsSaving] = useState(false);
      const [message, setMessage] = useState('');
      
      // Estado para crear un archivo nuevo
      const [showNewModal, setShowNewModal] = useState(false);
      const [newFilename, setNewFilename] = useState('');
      
      // Estado para previsualización de Markdown
      const [previewMode, setPreviewMode] = useState(false);

      // Función para insertar formato Markdown en el textarea
      const insertFormat = (prefix, suffix = '') => {
        const textarea = document.getElementById('markdown-editor');
        if (!textarea) return;
        
        const start = textarea.selectionStart;
        const end = textarea.selectionEnd;
        const text = textarea.value;
        const selected = text.substring(start, end);
        
        const replacement = prefix + selected + suffix;
        const newContent = text.substring(0, start) + replacement + text.substring(end);
        
        setEntryData(prev => ({ ...prev, content: newContent }));
        
        // Reposicionar cursor
        setTimeout(() => {
          textarea.focus();
          textarea.setSelectionRange(start + prefix.length, start + prefix.length + selected.length);
        }, 10);
      };

      // Cargar contenidos al inicio
      useEffect(() => {
        fetch('/api/content')
          .then(res => res.json())
          .then(data => {
            setCollections(data);
            // Auto-seleccionar primer archivo de projects si existe
            if (data.projects && data.projects.length > 0) {
              selectEntry('projects', data.projects[0].filename);
            }
          })
          .catch(err => console.error('Error al cargar contenidos:', err));
      }, []);

      // Seleccionar una entrada del listado
      const selectEntry = (col, filename) => {
        fetch(`/api/content/${col}/${filename}`)
          .then(res => res.json())
          .then(data => {
            setActiveEntry({ collection: col, filename });
            setEntryData(data);
            setMessage('');
          })
          .catch(err => console.error('Error al cargar entrada:', err));
      };

      // Guardar cambios
      const handleSave = () => {
        if (!activeEntry) return;
        setIsSaving(true);
        setMessage('');

        fetch(`/api/content/${activeEntry.collection}/${activeEntry.filename}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(entryData)
        })
          .then(res => res.json())
          .then(data => {
            setIsSaving(false);
            if (data.success) {
              setMessage('✓ Guardado con éxito');
              setTimeout(() => setMessage(''), 3000);
            } else {
              setMessage('Error: ' + data.error);
            }
          })
          .catch(err => {
            setIsSaving(false);
            setMessage('Error al conectar con el servidor');
          });
      };

      // Crear nueva entrada
      const handleCreateEntry = (e) => {
        e.preventDefault();
        if (!newFilename) return;

        fetch(`/api/content/${activeCollection}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: newFilename })
        })
          .then(res => {
            if (res.status === 409) {
              alert('El archivo ya existe.');
              throw new Error('Duplicado');
            }
            return res.json();
          })
          .then(data => {
            setShowNewModal(false);
            setNewFilename('');
            // Refrescar listados
            fetch('/api/content')
              .then(res => res.json())
              .then(cols => {
                setCollections(cols);
                selectEntry(activeCollection, data.filename);
              });
          })
          .catch(err => console.error(err));
      };

      // Actualizar campos frontmatter
      const updateMeta = (key, val) => {
        setEntryData(prev => ({
          ...prev,
          metadata: {
            ...prev.metadata,
            [key]: val
          }
        }));
      };

      // Helper: renderizar formularios adaptativos por colección
      const renderFormFields = () => {
        if (!entryData.metadata) return null;
        const meta = entryData.metadata;

        switch (activeEntry?.collection) {
          case 'projects':
            return (
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <h3 class="text-xl font-bold border-b pb-2">Información General</h3>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Título</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.title || ''} onChange={e => updateMeta('title', e.target.value)} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Descripción Corta</label>
                    <textarea class="w-full cms-input px-3 py-2 rounded-xl text-sm h-24" value={meta.description || ''} onChange={e => updateMeta('description', e.target.value)} />
                  </div>
                  <div class="grid grid-cols-2 gap-4">
                    <div>
                      <label class="block text-sm font-semibold mb-1">Período</label>
                      <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.periodo || ''} onChange={e => updateMeta('periodo', e.target.value)} />
                    </div>
                    <div>
                      <label class="block text-sm font-semibold mb-1">Orden (Posición)</label>
                      <input type="number" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.order || 0} onChange={e => updateMeta('order', parseInt(e.target.value))} />
                    </div>
                  </div>
                </div>

                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <h3 class="text-xl font-bold border-b pb-2">Imágenes & Recursos</h3>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Portada Destacada (Ruta/URL)</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.image || ''} onChange={e => updateMeta('image', e.target.value)} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Tags (Separados por coma)</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={Array.isArray(meta.tags) ? meta.tags.join(', ') : ''} onChange={e => updateMeta('tags', e.target.value.split(',').map(t => t.trim()))} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Vídeo de YouTube (ID)</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.videoYoutube || ''} onChange={e => updateMeta('videoYoutube', e.target.value)} />
                  </div>
                </div>
              </div>
            );
          
          case 'blog':
            return (
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <h3 class="text-xl font-bold border-b pb-2">Información del Post</h3>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Título</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.title || ''} onChange={e => updateMeta('title', e.target.value)} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Descripción / Resumen</label>
                    <textarea class="w-full cms-input px-3 py-2 rounded-xl text-sm h-24" value={meta.description || ''} onChange={e => updateMeta('description', e.target.value)} />
                  </div>
                  <div class="flex items-center gap-6 mt-2">
                    <label class="flex items-center gap-2 text-sm font-semibold cursor-pointer">
                      <input type="checkbox" checked={meta.published !== false} onChange={e => updateMeta('published', e.target.checked)} class="w-4 h-4 rounded accent-[#d88a75]" />
                      Publicado (Visibilidad en Producción)
                    </label>
                  </div>
                </div>

                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <h3 class="text-xl font-bold border-b pb-2">Metadatos & Portada</h3>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Categoría</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.category || 'General'} onChange={e => updateMeta('category', e.target.value)} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Tags (Separados por coma)</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={Array.isArray(meta.tags) ? meta.tags.join(', ') : ''} onChange={e => updateMeta('tags', e.target.value.split(',').map(t => t.trim()))} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Layout</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.layout || ''} onChange={e => updateMeta('layout', e.target.value)} />
                  </div>
                </div>
              </div>
            );

          case 'posts':
            return (
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <h3 class="text-xl font-bold border-b pb-2">Micro-Post</h3>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Imagen (Obligatoria)</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.image || ''} onChange={e => updateMeta('image', e.target.value)} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Copy / Mensaje</label>
                    <textarea class="w-full cms-input px-3 py-2 rounded-xl text-sm h-24" value={meta.copy || ''} onChange={e => updateMeta('copy', e.target.value)} />
                  </div>
                </div>

                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <h3 class="text-xl font-bold border-b pb-2">Clasificación</h3>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Categoría</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.category || 'General'} onChange={e => updateMeta('category', e.target.value)} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Tags (Separados por coma)</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={Array.isArray(meta.tags) ? meta.tags.join(', ') : ''} onChange={e => updateMeta('tags', e.target.value.split(',').map(t => t.trim()))} />
                  </div>
                </div>
              </div>
            );

          case 'journal':
            return (
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <h3 class="text-xl font-bold border-b pb-2">Bitácora</h3>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Título de Entrada</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.title || ''} onChange={e => updateMeta('title', e.target.value)} />
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Descripción Opcional</label>
                    <textarea class="w-full cms-input px-3 py-2 rounded-xl text-sm h-24" value={meta.description || ''} onChange={e => updateMeta('description', e.target.value)} />
                  </div>
                </div>

                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <h3 class="text-xl font-bold border-b pb-2">Relación de Proyecto</h3>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Slug del Proyecto Asociado (project)</label>
                    <select class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta.project || ''} onChange={e => updateMeta('project', e.target.value)}>
                      <option value="">Seleccionar Proyecto...</option>
                      {collections.projects?.map(p => (
                        <option key={p.slug} value={p.slug}>{p.slug}</option>
                      ))}
                    </select>
                  </div>
                  <div>
                    <label class="block text-sm font-semibold mb-1">Tags (Separados por coma)</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={Array.isArray(meta.tags) ? meta.tags.join(', ') : ''} onChange={e => updateMeta('tags', e.target.value.split(',').map(t => t.trim()))} />
                  </div>
                </div>
              </div>
            );

          default:
            return (
              <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                <h3 class="text-xl font-bold border-b pb-2">Metadatos Genéricos</h3>
                {Object.keys(meta).map(k => (
                  <div key={k}>
                    <label class="block text-sm font-semibold mb-1 capitalize">{k}</label>
                    <input type="text" class="w-full cms-input px-3 py-2 rounded-xl text-sm" value={meta[k] || ''} onChange={e => updateMeta(k, e.target.value)} />
                  </div>
                ))}
              </div>
            );
        }
      };

      // Filtrar entradas del sidebar según búsqueda
      const filteredEntries = collections[activeCollection]?.filter(entry => {
        return entry.filename.toLowerCase().includes(searchQuery.toLowerCase()) ||
               entry.slug.toLowerCase().includes(searchQuery.toLowerCase());
      }) || [];

      return (
        <div class="flex h-screen overflow-hidden">
          
          {/* Sidebar Izquierdo */}
          <aside class="w-64 cms-sidebar flex flex-col h-full shrink-0">
            <div class="p-6 border-b border-[var(--color-border)] flex items-center gap-3">
              <div class="w-8 h-8 rounded-full bg-[#d88a75] flex items-center justify-center text-white font-bold text-lg">Y</div>
              <div>
                <h1 class="text-lg font-black tracking-tight leading-none text-[#d88a75]">Yamil Ayma</h1>
                <span class="text-xs text-gray-400 font-semibold uppercase">CMS DE DESARROLLO</span>
              </div>
            </div>

            {/* Selector de Colecciones */}
            <div class="p-4 border-b border-[var(--color-border)]">
              <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Colecciones</label>
              <nav class="flex flex-col gap-1">
                {Object.keys(collections).map(col => (
                  <button
                    key={col}
                    class={`w-full text-left px-3 py-2 rounded-xl text-sm font-semibold transition-all flex items-center justify-between ${
                      activeCollection === col 
                        ? 'bg-[#d88a75]/10 text-[#d88a75] border-l-4 border-[#d88a75]' 
                        : 'hover:bg-gray-100 text-gray-600'
                    }`}
                    onClick={() => {
                      setActiveCollection(col);
                      setSearchQuery('');
                      if (collections[col] && collections[col].length > 0) {
                        selectEntry(col, collections[col][0].filename);
                      } else {
                        setActiveEntry(null);
                      }
                    }}
                  >
                    <span class="capitalize">{col}</span>
                    <span class="text-xs bg-gray-200 px-2 py-0.5 rounded-full text-gray-500 font-bold">{collections[col]?.length || 0}</span>
                  </button>
                ))}
              </nav>
            </div>

            {/* Listado de Entradas */}
            <div class="flex-1 overflow-y-auto p-4 flex flex-col gap-2">
              <div class="flex items-center justify-between mb-2">
                <label class="text-xs font-bold text-gray-400 uppercase">Entradas</label>
                <button 
                  onClick={() => setShowNewModal(true)}
                  class="text-xs font-bold bg-[#d88a75] text-white px-2 py-1 rounded-lg hover:bg-[#c27c69] transition-all"
                >
                  + Nuevo
                </button>
              </div>

              {/* Buscador Rápido */}
              <input 
                type="text" 
                placeholder="Buscar entrada..." 
                class="w-full cms-input px-3 py-1.5 rounded-xl text-xs mb-2"
                value={searchQuery}
                onChange={e => setSearchQuery(e.target.value)}
              />

              <div class="flex flex-col gap-1">
                {filteredEntries.map(entry => (
                  <button
                    key={entry.filename}
                    onClick={() => selectEntry(activeCollection, entry.filename)}
                    class={`w-full text-left px-3 py-2 rounded-xl text-xs font-medium truncate transition-all ${
                      activeEntry?.filename === entry.filename
                        ? 'bg-[#d88a75] text-white shadow-md'
                        : 'hover:bg-gray-100 text-gray-600'
                    }`}
                  >
                    {entry.slug}
                  </button>
                ))}
                {filteredEntries.length === 0 && (
                  <span class="text-xs text-gray-400 italic text-center py-4">No se encontraron entradas</span>
                )}
              </div>
            </div>
          </aside>

          {/* Área de Trabajo Principal */}
          <main class="flex-1 overflow-y-auto p-8 flex flex-col gap-8">
            
            {/* Header del CMS */}
            {activeEntry ? (
              <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 border-b pb-4">
                <div>
                  <div class="flex items-center gap-2 text-xs font-bold text-gray-400 uppercase mb-1">
                    <span class="capitalize">{activeEntry.collection}</span>
                    <span>/</span>
                    <span>{activeEntry.filename}</span>
                  </div>
                  <h2 class="text-3xl font-black text-gray-800">
                    Editar: <span class="text-[#d88a75]">{entryData.metadata?.title || activeEntry.filename.replace(/\.(md|mdx)$/, '')}</span>
                  </h2>
                </div>
                
                <div class="flex items-center gap-3">
                  {message && <span class="text-sm font-bold text-green-600 transition-all">{message}</span>}
                  <button
                    onClick={handleSave}
                    disabled={isSaving}
                    class="bg-[#d88a75] hover:bg-[#c27c69] text-white px-5 py-2.5 rounded-xl font-bold shadow-lg hover:shadow-xl transition-all disabled:opacity-50"
                  >
                    {isSaving ? 'Guardando...' : 'Guardar Cambios'}
                  </button>
                </div>
              </header>
            ) : (
              <div class="flex flex-col items-center justify-center flex-1 py-20 text-center">
                <div class="text-6xl mb-4">✍️</div>
                <h2 class="text-2xl font-bold mb-2">Bienvenido al CMS del Blog</h2>
                <p class="text-sm text-gray-500 max-w-md">Selecciona una colección o entrada en el sidebar izquierdo para comenzar a gestionar los contenidos físicos del blog en tiempo real.</p>
              </div>
            )}

            {/* Formulario Adaptativo & Markdown Editor */}
            {activeEntry && (
              <div class="flex flex-col gap-8">
                
                {/* Formulario de Metadatos */}
                {renderFormFields()}

                {/* Markdown Editor */}
                <div class="cms-card p-6 rounded-2xl flex flex-col gap-4">
                  <div class="flex items-center justify-between border-b pb-2">
                    <h3 class="text-xl font-bold">Cuerpo de la Publicación (Markdown Editor)</h3>
                    <div class="flex gap-2">
                      <button 
                        onClick={() => setPreviewMode(!previewMode)}
                        class={`text-xs font-bold px-3 py-1 rounded-lg transition-all border ${
                          previewMode 
                            ? 'bg-[#d88a75] text-white border-[#d88a75]' 
                            : 'hover:bg-gray-100 text-[#d88a75] border-[var(--color-border)]'
                        }`}
                      >
                        {previewMode ? '✍️ Editar' : '👁️ Vista Previa'}
                      </button>
                    </div>
                  </div>
                  
                  {/* Barra de Herramientas de Formato */}
                  {!previewMode && (
                    <div class="flex flex-wrap gap-1 bg-gray-50 p-2 rounded-xl border border-[var(--color-border)]">
                      <button type="button" onClick={() => insertFormat('**', '**')} class="px-2.5 py-1 text-xs font-bold rounded hover:bg-gray-200" title="Negrita">B</button>
                      <button type="button" onClick={() => insertFormat('*', '*')} class="px-2.5 py-1 text-xs italic rounded hover:bg-gray-200" title="Itálica">I</button>
                      <button type="button" onClick={() => insertFormat('# ')} class="px-2 py-1 text-xs font-bold rounded hover:bg-gray-200" title="Encabezado 1">H1</button>
                      <button type="button" onClick={() => insertFormat('## ')} class="px-2 py-1 text-xs font-bold rounded hover:bg-gray-200" title="Encabezado 2">H2</button>
                      <button type="button" onClick={() => insertFormat('### ')} class="px-2 py-1 text-xs font-bold rounded hover:bg-gray-200" title="Encabezado 3">H3</button>
                      <button type="button" onClick={() => insertFormat('- ')} class="px-2 py-1 text-xs rounded hover:bg-gray-200" title="Lista Viñeta">• Lista</button>
                      <button type="button" onClick={() => insertFormat('[', '](url)')} class="px-2 py-1 text-xs rounded hover:bg-gray-200" title="Insertar Enlace">Enlace</button>
                      <button type="button" onClick={() => insertFormat('![alt](', ')') } class="px-2 py-1 text-xs rounded hover:bg-gray-200" title="Insertar Imagen">Imagen</button>
                      <button type="button" onClick={() => insertFormat('`', '`')} class="px-2.5 py-1 text-xs font-mono rounded hover:bg-gray-200" title="Código Inline">&lt;&gt;</button>
                    </div>
                  )}
                  
                  {previewMode ? (
                    <div 
                      class="w-full p-6 rounded-xl border border-[var(--color-border)] bg-white h-96 overflow-y-auto prose max-w-none prose-headings:font-heading prose-p:font-body"
                      dangerouslySetInnerHTML={{ __html: marked.parse(entryData.content || '') }}
                    />
                  ) : (
                    <textarea
                      id="markdown-editor"
                      class="w-full cms-input p-4 rounded-xl text-sm font-mono h-96 leading-relaxed"
                      value={entryData.content || ''}
                      onChange={e => setEntryData(prev => ({ ...prev, content: e.target.value }))}
                      placeholder="Escribe el cuerpo de tu publicación utilizando Markdown..."
                    />
                  )}
                </div>
              </div>
            )}
          </main>

          {/* Modal de Nueva Entrada */}
          {showNewModal && (
            <div class="fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50 backdrop-blur-xs">
              <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 border border-gray-100 flex flex-col gap-4">
                <h3 class="text-xl font-bold text-gray-800">Crear Nueva Entrada</h3>
                <p class="text-xs text-gray-400 font-semibold uppercase">COLECCIÓN: <span class="text-[#d88a75]">{activeCollection}</span></p>
                
                <form onSubmit={handleCreateEntry} class="flex flex-col gap-4">
                  <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">Nombre del Archivo (Slug)</label>
                    <input 
                      type="text" 
                      placeholder="ej: mi-nuevo-post" 
                      required
                      class="w-full cms-input px-3 py-2 rounded-xl text-sm"
                      value={newFilename}
                      onChange={e => setNewFilename(e.target.value.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-_]/g, ''))}
                    />
                    <span class="text-xs text-gray-400 mt-1 block">Se autoguardará como archivo físico `.md` en la carpeta de la colección.</span>
                  </div>
                  
                  <div class="flex justify-end gap-3 mt-2">
                    <button 
                      type="button" 
                      onClick={() => { setShowNewModal(false); setNewFilename(''); }}
                      class="px-4 py-2 border rounded-xl text-sm font-semibold hover:bg-gray-50 transition-all"
                    >
                      Cancelar
                    </button>
                    <button 
                      type="submit"
                      class="px-4 py-2 bg-[#d88a75] hover:bg-[#c27c69] text-white rounded-xl text-sm font-bold shadow-md hover:shadow-lg transition-all"
                    >
                      Crear Recurso
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
