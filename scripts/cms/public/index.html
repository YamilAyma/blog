<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Blog CMS — Panel de Desarrollo</title>
  
  <!-- Favicon del Blog -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  
  <!-- Tipografías del Blog -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS v4 CDN -->
  <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  
  <!-- React 18 & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  
  <!-- Babel para transpilar JSX en caliente -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Estilos del CMS (tokens, utilitarios, animaciones) -->
  <link rel="stylesheet" href="./styles/cms.css">
</head>
<body class="min-h-screen">

  <div id="root"></div>

  <!-- Shell de arranque: carga dinámica de módulos y montaje de App -->
  <script type="text/babel">
    // Cargador dinámico de componentes modulares con Babel Standalone en el cliente
    async function loadComponent(url) {
      try {
        const res = await fetch(url);
        const code = await res.text();
        
        // Transpilar el código del componente convirtiendo exports de ES6 a UMD/CommonJS
        const transformed = Babel.transform(code, {
          presets: ['react'],
          plugins: ['transform-modules-umd']
        }).code;
        
        // Ejecutar en un sandbox local
        const exports = {};
        const module = { exports };
        const fn = new Function('React', 'exports', 'module', transformed);
        fn(React, exports, module);
        
        return module.exports;
      } catch (err) {
        console.error(`Error cargando componente ${url}:`, err);
        throw err;
      }
    }

    // Cargar y montar el componente raíz App
    loadComponent('./components/App.js').then(appMod => {
      const AppComponent = appMod.App;
      const rootElement = document.getElementById('root');
      const root = ReactDOM.createRoot(rootElement);
      root.render(<AppComponent loadComponent={loadComponent} />);
    }).catch(err => {
      console.error('Error fatal al iniciar el CMS:', err);
      document.getElementById('root').innerHTML = '<div style="padding:2rem;text-align:center;color:#694836;"><h2>Error al cargar el CMS</h2><p>' + err.message + '</p></div>';
    });
  </script>
</body>
</html>
